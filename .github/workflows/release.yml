name: Release

# Fires when a SemVer tag is pushed (e.g., v0.2.0, v1.0.0-beta.1).
# Builds the production extension, packages the zip, and creates a
# GitHub Release with the zip attached and an auto-generated changelog.
#
# Workflow to cut a release:
#   1. Bump "version" in package.json on main (via PR)
#   2. After merge: git tag v0.2.0 && git push origin v0.2.0
#   3. This workflow runs and creates the Release
#
# Uploading to the Chrome Web Store is still manual — that requires
# OAuth credentials and is deferred until first manual publish has
# proven the listing flow.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match package.json version ($PKG). Bump the version in a PR first, then tag."
            exit 1
          fi
          echo "Tag and package.json agree on version: $TAG"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Package extension
        run: npm run package

      - name: Rename zip to include version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mv build/chrome-mv3-prod.zip "build/localmind-${VERSION}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          generate_release_notes: true
          files: build/localmind-*.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
