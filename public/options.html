<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ollama Sidekick - Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { margin-bottom: 20px; }
    h2 { margin: 20px 0 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .field { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: 500; }
    input[type="text"], input[type="number"], select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1557b0; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status { padding: 10px; border-radius: 4px; margin-top: 10px; }
    .status.error { background: #f8d7da; color: #721c24; }
    .status.success { background: #d4edda; color: #155724; }
    .mcp-server { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #eee; border-radius: 4px; margin-bottom: 8px; }
    .mcp-server input { flex: 1; margin-right: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./options.tsx"></script>
</body>
</html>
